name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why.

        **Note:** This package intentionally has a small API surface. Not every feature request will be accepted — please explain the use case so we can evaluate fit.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve? What's the use case?
      placeholder: "I'm trying to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include API examples if you have ideas.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds? Are there alternative approaches?

  - type: textarea
    id: code
    attributes:
      label: Code example
      description: What would the ideal API look like?
      render: dart
