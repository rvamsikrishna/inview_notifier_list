name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the details below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create an InViewNotifierList with ...
        2. Scroll to ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction code
      description: A minimal code snippet that reproduces the issue. This helps us fix it faster.
      render: dart

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "4.0.0"
    validations:
      required: true

  - type: textarea
    id: flutter-version
    attributes:
      label: Flutter doctor output
      description: Paste the output of `flutter doctor -v`
      render: text

  - type: dropdown
    id: platforms
    attributes:
      label: Affected platforms
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Linux
        - Windows
